<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Rajdhani', sans-serif;
    background-color: #050508;
    background-image: 
        radial-gradient(at 20% 20%, rgba(79, 70, 229, 0.12) 0px, transparent 50%),
        radial-gradient(at 80% 40%, rgba(6, 182, 212, 0.12) 0px, transparent 50%),
        radial-gradient(at 40% 80%, rgba(147, 51, 234, 0.12) 0px, transparent 50%);
    background-attachment: fixed;
    background-size: 200% 200%;
    animation: ambientSpace 20s ease infinite;
    color: white;
    overflow-x: hidden;
    min-height: 100vh;
}

@keyframes ambientSpace {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
}

/* LANDING PAGE (FRONT PAGE) STYLE */
#landing-view {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 10;
    padding: 20px;
    transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s;
}

#landing-view.hide {
    transform: translateY(-100vh);
    opacity: 0;
    pointer-events: none;
    position: absolute;
    width: 100%;
    display: none !important; /* Force layout removal to prevent empty spacing */
}

.landing-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 5.5rem;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(to right, #06b6d4, #9333ea, #f43f5e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 30px rgba(6, 182, 212, 0.4));
    animation: float 4s infinite ease-in-out;
}

.landing-subtitle {
    font-size: 1.4rem;
    margin: 25px 0 40px 0;
    color: #94a3b8;
    letter-spacing: 6px;
    text-shadow: 0 0 10px rgba(255,255,255,0.1);
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.enter-btn {
    font-family: 'Orbitron', sans-serif;
    padding: 18px 50px;
    font-size: 1.2rem;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    background: linear-gradient(45deg, #06b6d4, #9333ea);
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 25px rgba(6, 182, 212, 0.4);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    letter-spacing: 2px;
}

.enter-btn:hover {
    transform: scale(1.05) translateY(-3px);
    box-shadow: 0 0 40px rgba(6, 182, 212, 0.8), 0 0 20px rgba(147, 51, 234, 0.5);
}

/* MAIN GALLERY VIEW (HIDDEN BY DEFAULT) */
#main-gallery-view {
    display: none;
    opacity: 0;
    transition: opacity 0.8s ease-in;
    flex-direction: column;
    min-height: 100vh;
}

#main-gallery-view.show {
    display: flex;
    opacity: 1;
}

/* Glassmorphism Sticky Navbar */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

.nav-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    cursor: pointer;
}

.nav-right-controls {
    display: flex;
    align-items: center;
    gap: 20px;
}

.search-container input {
    padding: 8px 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    outline: none;
    transition: 0.3s;
    font-family: inherit;
}

.search-container input:focus {
    border-color: #06b6d4;
    box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
}

/* Custom Top Right Categories Dropdown Options */
.dropdown {
    position: relative;
    display: inline-block;
}

.dropbtn {
    background: rgba(255, 255, 255, 0.06);
    color: white;
    padding: 8px 18px;
    font-size: 0.95rem;
    font-weight: 600;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
    font-family: 'Orbitron', sans-serif;
}

.dropbtn:hover {
    background: rgba(6, 182, 212, 0.2);
    border-color: #06b6d4;
}

.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    background-color: rgba(10, 10, 18, 0.95);
    min-width: 180px;
    box-shadow: 0px 8px 25px 0px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    z-index: 1001;
    overflow: hidden;
    backdrop-filter: blur(10px);
}

.dropdown-content a {
    color: #cbd5e1;
    padding: 10px 16px;
    text-decoration: none;
    display: block;
    font-size: 0.95rem;
    transition: 0.2s;
    text-transform: capitalize;
}

.dropdown-content a:hover {
    background: linear-gradient(90deg, rgba(6, 182, 212, 0.2), rgba(147, 51, 234, 0.2));
    color: #fff;
    padding-left: 22px;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* TOP AUTOPLAY SLIDESHOW SYSTEM STYLE */
.slideshow-wrapper {
    margin-top: 100px;
    padding: 0 40px;
    width: 100%;
}

.slideshow-container {
    max-width: 100%;
    height: 320px;
    position: relative;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.05);
}

.slide-item {
    display: none;
    width: 100%;
    height: 100%;
    position: relative;
}

.slide-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.65);
}

.slide-caption {
    position: absolute;
    bottom: 40px;
    left: 40px;
    color: white;
    z-index: 5;
}

.slide-caption h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    background: linear-gradient(45deg, #06b6d4, #f43f5e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.slide-caption p {
    font-size: 1.1rem;
    color: #cbd5e1;
    margin-top: 5px;
}

/* 3D Premium Dynamic Gallery Grid Grid setup */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 35px;
    padding: 50px 40px;
    flex: 1;
}

.card {
    overflow: hidden;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    /* FIXED TRANSITION TYPO BELOW: Changed 0.16. 1 to 0.16, 1 */
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, box-shadow 0.4s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: translateY(-8px);
    border-color: rgba(6, 182, 212, 0.4);
    box-shadow: 0 20px 40px rgba(6, 182, 212, 0.15);
}

.img-container {
    width: 100%;
    height: 260px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.card:hover img {
    transform: perspective(1000px) rotateY(6deg) rotateX(4deg) scale(1.05);
}

/* Image text information block below individual card design */
.card-info {
    padding: 15px;
    background: rgba(10, 10, 15, 0.6);
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    text-align: center;
}

.card-title {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #f1f5f9;
    text-transform: capitalize;
}

.card-tag {
    font-size: 0.8rem;
    color: #06b6d4;
    text-transform: uppercase;
    margin-top: 4px;
    letter-spacing: 1px;
}

/* Premium Footer layout */
.gallery-footer {
    width: 100%;
    padding: 25px;
    text-align: center;
    background: rgba(8, 8, 12, 0.9);
    border-top: 1px solid rgba(255, 255, 255, 0.05);

.footer-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #06b6d4, #9333ea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

/* Lightbox view modal context overlay style */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4, 4, 6, 0.97);
    backdrop-filter: blur(15px);
    justify-content: center;
    align-items: center;
    z-index: 9999;

.lightbox img {
    max-width: 85%;
    max-height: 75%;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(6, 182, 212, 0.3);
    border: 1px solid rgba(255,255,255,0.1);
}

.lightbox-caption {
    position: absolute;
    bottom: 40px;
    text-align: center;
    width: 100%;
}

.lightbox-title {
    font-size: 1.6rem;
    font-weight: bold;
    text-transform: capitalize;
    letter-spacing: 2px;
}

.nav, .close {
    position: absolute;
    font-size: 2.5rem;
    cursor: pointer;
    padding: 15px;
    color: #94a3b8;
    transition: 0.3s;
    user-select: none;
}

.nav:hover, .close:hover {
    color: #06b6d4;
    text-shadow: 0 0 15px #06b6d4;
}

.close { top: 30px; right: 40px; }
.prev { left: 40px; }
.next { right: 40px; }

/* Responsive break configurations */
@media(max-width: 768px) {
    .navbar { padding: 15px 20px; }
    .landing-title { font-size: 3.2rem; }
    .landing-subtitle { font-size: 1rem; letter-spacing: 3px; }
    .slideshow-wrapper { padding: 0 20px; margin-top: 90px; }
    .slideshow-container { height: 220px; }
    .slide-caption h2 { font-size: 1.6rem; }
    .gallery { padding: 20px; gap: 20px; }
    .search-container input { width: 140px; }
}

    categoryImageIds[cat].forEach(item => {
        let url = `https://images.unsplash.com/${item.id}?auto=format&fit=crop&w=800&q=80`;
        images.push({ url, cat, title: item.name });
    });

    // 2. Build the top right category configuration dropdown menu hooks 
    let dropLink = document.createElement('a');
    dropLink.href = "#";
    dropLink.textContent = cat;
    dropLink.onclick = function(e) {
        e.preventDefault();
        filterGallery(cat);
    };
    dropdownCategories.appendChild(dropLink);

    // 3. Inject slide items dynamically into the container for structural looping
    let randomItem = categoryImageIds[cat][0]; // Uses first image from each category for slider
    let slideUrl = `https://images.unsplash.com/${randomItem.id}?auto=format&fit=crop&w=1200&q=80`;
    
    let slideHtml = `
        <div class="slide-item">
            <img src="${slideUrl}" alt="${cat}">
            <div class="slide-caption">
                <h2>Category: ${cat}</h2>
                <p>Discover stunning high-definition curation packages.</p>
            </div>
        </div>
    `;
    slideshowContainer.innerHTML += slideHtml;
});

visibleImages = [...images];

// Trigger front page route switch mechanics
function activateGalleryView() {
    document.getElementById('landing-view').classList.add('hide');
    const mainView = document.getElementById('main-gallery-view');
    mainView.classList.add('show');
    
    // Fire render cycles once target content displays correctly
    renderCards();
    initSlideshow();
}

// Render layout grid displaying Titles below every image card
function renderCards() {
    gallerySection.innerHTML = '';
    visibleImages.forEach((img, index) => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="img-container">
                <img src="${img.url}" data-index="${index}" alt="${img.title}" loading="lazy">
            </div>
            <div class="card-info">
                <div class="card-title">${img.title}</div>
                <div class="card-tag">${img.cat}</div>
            </div>
        `;
        gallerySection.appendChild(card);
    });
}

// Top slideshow looping logic sequence initialization
function initSlideshow() {
    showSlides();
    setInterval(showSlides, 3500); // Transitions slide every 3.5 seconds automatically
}

function showSlides() {
    let slides = document.getElementsByClassName("slide-item");
    if (slides.length === 0) return;
    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";  
    }
    slideIndex++;
    if (slideIndex > slides.length) { slideIndex = 1; }    
    slides[slideIndex-1].style.display = "block";  
}

// Global modal view event managers
let current = 0;
const lightbox = document.getElementById('lightbox');
const bigImg = document.getElementById('bigImg');
const lightboxTitle = document.getElementById('lightboxTitle');

gallerySection.addEventListener('click', e => {
    if (e.target.tagName === 'IMG') {
        current = parseInt(e.target.dataset.index);
        openLightbox();
    }
});

function openLightbox() {
    lightbox.style.display = 'flex';
    bigImg.src = visibleImages[current].url;
    lightboxTitle.textContent = visibleImages[current].title;
}

function closeBox() { lightbox.style.display = 'none'; }

function next() {
    if(visibleImages.length === 0) return;
    current = (current + 1) % visibleImages.length;
    openLightbox();
}

function prev() {
    if(visibleImages.length === 0) return;
    current = (current - 1 + visibleImages.length) % visibleImages.length;
    openLightbox();
}

lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox) closeBox();
});

// Category filtering system
function filterGallery(cat) {
    document.getElementById('search').value = '';
    if (cat === 'all') {
        visibleImages = [...images];
    } else {
        visibleImages = images.filter(img => img.cat === cat);
    }
    renderCards();
    
    // Smooth auto scroll right to contents frame area
    window.scrollTo({
        top: slideshowContainer.offsetTop + 280,
        behavior: 'smooth'
    });
}

// Live Input Filter Lookups
document.getElementById('search').addEventListener('input', function() {
    let v = this.value.toLowerCase();
    visibleImages = images.filter(img => img.cat.includes(v) || img.title.toLowerCase().includes(v));
    renderCards();
});
</script>
</body>
</html>
