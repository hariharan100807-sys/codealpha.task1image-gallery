<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Galaxy Images Premium 3D Gallery</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Orbitron', sans-serif;
    background-color: #050508;
    background-image: 
        radial-gradient(at 20% 20%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
        radial-gradient(at 80% 40%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
        radial-gradient(at 40% 80%, rgba(147, 51, 234, 0.15) 0px, transparent 50%);
    background-attachment: fixed;
    background-size: 200% 200%;
    animation: ambientSpace 20s ease infinite;
    color: white;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

@keyframes ambientSpace {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
}

/* Glassmorphism Sticky Navbar */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

.nav-logo {
    font-size: 1.5rem;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    cursor: pointer;
}

.search-container {
    display: flex;
    align-items: center;
}

.search-container input {
    padding: 8px 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    outline: none;
    transition: 0.3s;
}

.search-container input:focus {
    border-color: #06b6d4;
    box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
}

/* Category Filter Controls Section Below Hero */
.controls-wrapper {
    max-width: 1200px;
    margin: 40px auto 0 auto;
    padding: 0 20px;
    width: 100%;
    text-align: center;
}

.controls {
    display: inline-flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    padding: 12px 20px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 30px;
}

.controls button {
    padding: 8px 18px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.03);
    color: #cbd5e1;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-transform: capitalize;
    font-weight: 500;
}

.controls button:hover, .controls button.active {
    background: linear-gradient(45deg, #06b6d4, #9333ea);
    color: white;
    border-color: transparent;
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
    transform: translateY(-2px);
}

/* Hero Section */
.hero {
    height: 75vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding-top: 80px;
}

.hero h1 {
    font-size: 5rem;
    background: linear-gradient(to right, #06b6d4, #9333ea, #f43f5e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 20px rgba(6, 182, 212, 0.3));
    animation: float 4s infinite ease-in-out;
}

.hero p {
    font-size: 1.3rem;
    margin: 20px;
    color: #94a3b8;
}

@keyframes float {
    0%, 100% { transform: translateY(0) }
    50% { transform: translateY(-15px) }
}

.start-btn {
    padding: 15px 40px;
    font-size: 1.1rem;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    background: linear-gradient(45deg, #06b6d4, #9333ea);
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(6, 182, 212, 0.2);
    transition: .4s;
}

.start-btn:hover {
    transform: scale(1.05) translateY(-3px);
    box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
}

/* 3D Premium Gallery Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 30px;
    padding: 40px 40px 60px 40px;
    scroll-margin-top: 100px;
    flex: 1;
}

.card {
    overflow: hidden;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    transition: transform 0.5s, box-shadow 0.5s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    border-color: rgba(6, 182, 212, 0.3);
    box-shadow: 0 15px 35px rgba(6, 182, 212, 0.15);
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    transition: .8s cubic-bezier(0.16, 1, 0.3, 1);
}

.card img:hover {
    transform: perspective(1000px) rotateY(12deg) rotateX(8deg) scale(1.05);
}

/* Premium Footer */
.gallery-footer {
    width: 100%;
    padding: 30px;
    text-align: center;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3);
    margin-top: auto;
}

.footer-text {
    font-size: 1.4rem;
    font-weight: 500;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #06b6d4, #9333ea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 10px rgba(6, 182, 212, 0.2));
}

/* Lightbox Styling */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 8, 0.95);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.lightbox img {
    max-width: 85%;
    max-height: 80%;
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
}

.nav, .close {
    position: absolute;
    font-size: 2.5rem;
    cursor: pointer;
    padding: 15px;
    color: #94a3b8;
    transition: 0.3s;
    user-select: none;
}

.nav:hover, .close:hover {
    color: white;
    text-shadow: 0 0 10px white;
}

.close { top: 30px; right: 40px; }
.prev { left: 40px; }
.next { right: 40px; }

/* Responsive adjustments */
@media(max-width: 768px) {
    .navbar {
        padding: 15px 20px;
    }
    .hero h1 { font-size: 3rem; }
    .hero p { font-size: 1.1rem; }
    .gallery { padding: 20px; }
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo" onclick="window.scrollTo({top:0, behavior:'smooth'})">🌌 RH Nexus Gallery</div>
    <div class="search-container">
        <input id="search" placeholder="Search category...">
    </div>
</nav>

<section class="hero">
    <h1>RH Nexus IMAGES</h1>
    <p>VISUAL GALLERY . LIVE IMAGES . CURATED COLLECTION . IMMPERSIVE EXPERINCE</p>
    <button class="start-btn" onclick="document.getElementById('controlsSection').scrollIntoView({behavior:'smooth'})">
        Explore Gallery
    </button>
</section>

<div class="controls-wrapper" id="controlsSection">
    <div class="controls" id="filterControls">
        <button class="active" onclick="filterGallery('all', this)">All</button>
    </div>
</div>

<div class="gallery" id="gallerySection"></div>

<footer class="gallery-footer">
    <div class="footer-text">RH Nexus Gallery : via unsplash : @2026</div>
</footer>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeBox()">✖</span>
    <span class="nav prev" onclick="prev()">❮</span>
    <img id="bigImg" alt="Enlarged view">
    <span class="nav next" onclick="next()">❯</span>
</div>

<script>
// 10 distinct categories with exactly 5 unique image IDs each (Total 50 images)
const categoryImageIds = {
    nature: [
        'photo-1470071459604-3b5ec3a7fe05', 'photo-1447752875215-b2761acb3c5d', 
        'photo-1441974231531-c6227db76b6e', 'photo-1501854140801-50d01698950b'
    ],
    city: [
        'photo-1477959858617-67f85cf4f1df', 'photo-1449034446853-66c86144b0ad',
        'photo-1486406146926-c627a92ad1ab', 'photo-1476514525535-07fb3b4ae5f1', 'photo-1514565131-fce0801e5785'
    ],
    animals: [
        'photo-1533738363-b7f9aef128ce','photo-1546182990-dffeafbe841d', 'photo-1564349683136-77e08dba1ef7'
    ],
    birds: [
        'photo-1444464666168-49d633b86797', 'photo-1552410260-0fd9b577afa6',
        'photo-1452570053594-1b985d6ea890', 'photo-1606567595334-d39972c85dbe'
    ],
    cars: [
        'photo-1503376780353-7e6692767b70','photo-1542282088-fe8426682b8f', 'photo-1552519507-da3b142c6e3d', 'photo-1580273916550-e323be2ae537'
    ],
    bikes: [
        'photo-1558981806-ec527fa84c39', 'photo-1568772585407-9361f9bf3a87',
        'photo-1449426468159-d96dbf08f19f', 'photo-1599819811279-d5ad9cccf838', 'photo-1558981403-c5f9899a28bc'
    ],
    space: [
        'photo-1451187580459-43490279c0fa', 'photo-1506318137071-a8e063b4bec0',
        'photo-1446776811953-b23d57bd21aa', 'photo-1538370965046-79c0d6907d47', 'photo-1464802686167-b939a6910659'
    ],
    ocean: [
        'photo-1505118380757-91f5f5632de0', 'photo-1544551763-46a013bb70d5',
        'photo-1518837695005-2083093ee35b', 'photo-1439066615861-d1af74d74000', 'photo-1507525428034-b723cf961d3e'
    ],
    mountains: [
        'photo-1464822759023-fed622ff2c3b', 'photo-1506744038136-46273834b3fb',
        'photo-1454496522488-7a8e488e8606', 'photo-1498050108023-c5249f4df085', 'photo-1519681393784-d120267933ba'
    ],
    desert: [
        'photo-1509316975850-ff9c5deb0cd9', 'photo-1547234935-80c7145ec969',
        'photo-1509316785289-025f5b846b35', 'photo-1473580044384-7ba9967e16a0', 'photo-1532960401447-7dd05bef20b0'
    ]
};

const gallery = document.getElementById('gallerySection');
const filterControls = document.getElementById('filterControls');
let images = [];
let visibleImages = [];

// Dynamically generate navigation filter buttons cleanly
Object.keys(categoryImageIds).forEach(cat => {
    let btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = function() { filterGallery(cat, this); };
    filterControls.appendChild(btn);
});

// Render layout grid tracking indices correctly
Object.keys(categoryImageIds).forEach(cat => {
    categoryImageIds[cat].forEach(id => {
        let url = `https://images.unsplash.com/${id}?auto=format&fit=crop&w=600&q=80`;
        images.push({ url, cat });
    });
});

// Initialize active view tracking
visibleImages = [...images];

function renderCards() {
    gallery.innerHTML = '';
    visibleImages.forEach((img, index) => {
        let card = document.createElement('div');
        card.className = 'card';
        card.dataset.category = img.cat;
        card.innerHTML = `<img src="${img.url}" data-index="${index}" alt="${img.cat}" loading="lazy">`;
        gallery.appendChild(card);
    });
}
renderCards();

let current = 0;
const lightbox = document.getElementById('lightbox');
const bigImg = document.getElementById('bigImg');

gallery.addEventListener('click', e => {
    if (e.target.tagName === 'IMG') {
        current = parseInt(e.target.dataset.index);
        lightbox.style.display = 'flex';
        bigImg.src = visibleImages[current].url;
    }
});

function closeBox() { lightbox.style.display = 'none'; }
function next() {
    if(visibleImages.length === 0) return;
    current = (current + 1) % visibleImages.length;
    bigImg.src = visibleImages[current].url;
}
function prev() {
    if(visibleImages.length === 0) return;
    current = (current - 1 + visibleImages.length) % visibleImages.length;
    bigImg.src = visibleImages[current].url;
}

lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox) closeBox();
});

function filterGallery(cat, btn) {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    document.getElementById('search').value = '';

    if (cat === 'all') {
        visibleImages = [...images];
    } else {
        visibleImages = images.filter(img => img.cat === cat);
    }
    renderCards();
}

document.getElementById('search').addEventListener('input', function() {
    let v = this.value.toLowerCase();
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    
    visibleImages = images.filter(img => img.cat.includes(v));
    renderCards();
});
</script>
</body>
</html>
