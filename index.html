<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h1>Interactive Image Gallery</h1>

        <div class="filter-buttons">
            <button class="btn active" data-filter="all">All</button>
            <button class="btn" data-filter="nature">Nature</button>
            <button class="btn" data-filter="architecture">Architecture</button>
            <button class="btn" data-filter="animals">Animals</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="nature">
                <img src="https://picsum.photos/id/10/800/600" alt="Beautiful Forest Lake" class="gallery-img">
                <div class="overlay"><span>Nature</span></div>
            </div>
            <div class="gallery-item" data-category="architecture">
                <img src="https://picsum.photos/id/1011/800/600" alt="Modern Architecture" class="gallery-img">
                <div class="overlay"><span>Architecture</span></div>
            </div>
            <div class="gallery-item" data-category="animals">
                <img src="https://picsum.photos/id/1025/800/600" alt="Cute Pug Dog" class="gallery-img">
                <div class="overlay"><span>Animals</span></div>
            </div>
            <div class="gallery-item" data-category="nature">
                <img src="https://picsum.photos/id/28/800/600" alt="Forest Pathway" class="gallery-img">
                <div class="overlay"><span>Nature</span></div>
            </div>
            <div class="gallery-item" data-category="architecture">
                <img src="https://picsum.photos/id/1031/800/600" alt="Classic Building" class="gallery-img">
                <div class="overlay"><span>Architecture</span></div>
            </div>
            <div class="gallery-item" data-category="animals">
                <img src="https://picsum.photos/id/1062/800/600" alt="Wild Butterfly" class="gallery-img">
                <div class="overlay"><span>Animals</span></div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn">&#10094;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-caption"></div>
        </div>
        <button class="nav-btn next-btn">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
